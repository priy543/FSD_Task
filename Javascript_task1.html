<!DOCTYPE html>
<html>
<head>
    <title>Alert Message Example</title>
    <style>
        body{
            background-color: lightblue;
            text-align: center;
            font-family: Arial, sans-serif;
            padding-top: 100px;
        }

        h1{
            color: navy;
        }

        button{
            background-color: green;
            color: white;
            padding: 12px 25px;
            font-size: 18px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover{
            background-color: darkgreen;
        }
    </style>
</head>
<body>

    <h1>Alert Message Program</h1>
    <p>Click the button to display an alert message.</p>

    <button onclick="showAlert()">Click Me</button>

    <script>
        function showAlert() {
            alert("Welcome! You clicked the button.");
        }
    </script>

</body>
</html>
