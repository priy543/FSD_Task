<!DOCTYPE html>
<html>
<head>
    <title>Student Details Table</title>
    <style>
        table {
            width: 60%;
            border-collapse: collapse;
            margin: 20px auto;
        }

        th, td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }

        th {
            background-color: lightblue;
        }

        tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        h1 {
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Student Details</h1>

    <table>
        <tr>
            <th>Roll No</th>
            <th>Name</th>
            <th>Department</th>
            <th>Year</th>
        </tr>

        </tr>

        <tr>
            <td>102</td>
            <td>Diya</td>

            <td>III</td>
        </tr>

        <tr>
            <td>103</td>
            <td>Anitha</td>

        </tr>

        <tr>
            <td>104</td>
            <td>Karthik</td>

            <td>III</td>
        </tr>
    </table>

</body>
</html>
